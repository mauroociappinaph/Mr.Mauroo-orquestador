version: 2

project_name: mr-mauroo-ai

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/mr-mauroo-ai
    binary: mr-mauroo-ai
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: Mr-Mauroo-Programming
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    name: mr-mauroo-ai
    homepage: "https://github.com/Mr-Mauroo/mr-mauroo-ai"
    description: "Mr-Mauroo-AI — Ecosystem, Frameworks, Workflows for AI coding agents."
    license: "MIT"
    commit_msg_template: "chore: update mr-mauroo-ai formula to {{ .Tag }}"

scoops:
  - repository:
      owner: Mr-Mauroo-Programming
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: mr-mauroo-ai
    homepage: "https://github.com/Mr-Mauroo/mr-mauroo-ai"
    description: "Mr-Mauroo-AI — Ecosystem, Frameworks, Workflows for AI coding agents."
    license: MIT
    commit_msg_template: "chore: update mr-mauroo-ai to {{ .Tag }}"
